<header id="topbar" [class.scrolled]="scrolled">

  <!-- BRAND -->
  <a routerLink="/" class="brand">
    <div class="brand-mark">N</div>
    <span class="brand-name">Noctis<span>Hall</span></span>
  </a>

  <!-- NAV DESKTOP -->
  <nav class="nav-desktop">
    <a routerLink="/eventos-listagem"  routerLinkActive="active">Agenda</a>
    <a routerLink="/clientes-listagem" routerLinkActive="active">Clientes</a>
    <a routerLink="/pedidos-listagem"  routerLinkActive="active">Vendas</a>
  </nav>

  <!-- AÇÕES -->
  <div class="topbar-actions">
    <a routerLink="/eventos-cadastrar" class="btn-primary">+ Novo Evento</a>

    <!-- HAMBURGUER MOBILE -->
    <button
      class="hamburger"
      [class.open]="mobileMenuAberto"
      (click)="toggleMobileMenu()"
      aria-label="Menu"
      [attr.aria-expanded]="mobileMenuAberto">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

</header>

<!-- MOBILE MENU -->
<nav id="mobile-menu" [class.open]="mobileMenuAberto" (click)="fecharMobileMenu()">
  <a routerLink="/eventos-listagem"   routerLinkActive="active">Agenda</a>
  <a routerLink="/eventos-cadastrar"  routerLinkActive="active">Novo Evento</a>
  <a routerLink="/eventos-consultar"  routerLinkActive="active">Buscar Evento</a>
  <hr class="mobile-divisor" />
  <a routerLink="/clientes-listagem"  routerLinkActive="active">Clientes</a>
  <a routerLink="/clientes-cadastrar" routerLinkActive="active">Novo Cliente</a>
  <a routerLink="/clientes-consultar" routerLinkActive="active">Buscar Cliente</a>
  <hr class="mobile-divisor" />
  <a routerLink="/pedidos-listagem"   routerLinkActive="active">Relatório de Vendas</a>
  <a routerLink="/pedidos-cadastrar"  routerLinkActive="active">Nova Venda</a>
  <a routerLink="/eventos-cadastrar" class="btn-primary">+ Novo Evento</a>
</nav>
